<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div style="max-width:600px;margin:0 auto;font-family:sans-serif;padding:20px;">
    <h2>考勤管理系統 — 請假申請通知</h2>
    <p>您的下屬 <strong th:text="${applicantName}">申請人</strong> 提交了一份請假申請：</p>
    <table style="border-collapse:collapse;width:100%;max-width:400px;">
        <tr><td style="padding:8px;border:1px solid #ddd;font-weight:bold;">假別</td>
            <td style="padding:8px;border:1px solid #ddd;" th:text="${leaveTypeName}">假別</td></tr>
        <tr><td style="padding:8px;border:1px solid #ddd;font-weight:bold;">開始時間</td>
            <td style="padding:8px;border:1px solid #ddd;" th:text="${startTime}">開始</td></tr>
        <tr><td style="padding:8px;border:1px solid #ddd;font-weight:bold;">結束時間</td>
            <td style="padding:8px;border:1px solid #ddd;" th:text="${endTime}">結束</td></tr>
        <tr><td style="padding:8px;border:1px solid #ddd;font-weight:bold;">職務代理人</td>
            <td style="padding:8px;border:1px solid #ddd;" th:text="${agentName} ?: '無'">代理人</td></tr>
    </table>
    <p>請登入系統進行簽核。</p>
</div>
</body>
</html>
